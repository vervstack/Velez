    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
            background: #0c0c0f;
            overflow: hidden;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1
            }
            50% {
                opacity: 0.4
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(6px)
            }
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-6px)
            }
            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0
            }
            100% {
                background-position: 200% 0
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(10, 183, 238, 0.18);
            border-radius: 99px;
        }
    </style>
</head>

    function useTweaks(defaults) {
        const [values, setValues] = useState(defaults);
        const setTweak = useCallback((keyOrEdits, val) => {
            const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
                ? keyOrEdits : {[keyOrEdits]: val};
            setValues(prev => ({...prev, ...edits}));
            window.parent.postMessage({type: '__edit_mode_set_keys', edits}, '*');
        }, []);

        function TweaksPanel({children}) {
            const [open, setOpen] = useState(false);
            const dragRef = useRef(null);
            const offsetRef = useRef({x: 16, y: 16});

            useEffect(() => {
                const onMsg = e => {
                    const t = e?.data?.type;
                    if (t === '__activate_edit_mode') setOpen(true);
                    else if (t === '__deactivate_edit_mode') setOpen(false);
                };
                window.addEventListener('message', onMsg);
                window.parent.postMessage({type: '__edit_mode_available'}, '*');
                return () => window.removeEventListener('message', onMsg);
            }, []);

            const dismiss = () => {
                setOpen(false);
                window.parent.postMessage({type: '__edit_mode_dismissed'}, '*');
            };

            const onDragStart = e => {
                const panel = dragRef.current;
                if (!panel) return;
                const r = panel.getBoundingClientRect();
                const sx = e.clientX, sy = e.clientY;
                const startRight = window.innerWidth - r.right;
                const startBottom = window.innerHeight - r.bottom;
                const move = ev => {
                    offsetRef.current = {
                        x: Math.max(8, startRight - (ev.clientX - sx)),
                        y: Math.max(8, startBottom - (ev.clientY - sy)),
                    };
                    if (panel) {
                        panel.style.right = offsetRef.current.x + 'px';
                        panel.style.bottom = offsetRef.current.y + 'px';
                    }
                };
                const up = () => {
                    window.removeEventListener('mousemove', move);
                    window.removeEventListener('mouseup', up);
                };
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', up);
            };

            if (!open) return null;
            return (
                <>
                    <style>{__TWEAKS_STYLE}</style>
                    <div ref={dragRef} className="twk-panel"
                         style={{right: offsetRef.current.x, bottom: offsetRef.current.y}}>
                        <div className="twk-hd" onMouseDown={onDragStart}>
                            <b>Tweaks</b>
                            <button className="twk-x" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕
                            </button>
                        </div>
                        <div className="twk-body">{children}</div>
                    </div>
                </>
            );
        }

        function TweakSection({label}) {
            return <div className="twk-sect">{label}</div>;
        }

        function TweakToggle({id, label}) {
            return (
                <div className="twk-row twk-row-h">
                    <div className="twk-lbl"><span>{label}</span></div>
                    <button type="button" className="twk-toggle" data-on={values[id] ? '1' : '0'}
                            onClick={() => setTweak(id, !values[id])}><i/></button>
                </div>
            );
        }

        function TweakRadio({id, label, options}) {
            const trackRef = useRef(null);
            const opts = options.map(o => typeof o === 'object' ? o : {value: o, label: o});
            const idx = Math.max(0, opts.findIndex(o => o.value === values[id]));
            const n = opts.length;
            return (
                <div className="twk-row">
                    <div className="twk-lbl"><span>{label}</span></div>
                    <div ref={trackRef} className="twk-seg">
                        <div className="twk-seg-thumb"
                             style={{left: `calc(2px + ${idx}*(100% - 4px)/${n})`, width: `calc((100% - 4px)/${n})`}}/>
                        {opts.map(o => (
                            <button key={o.value} type="button" onClick={() => setTweak(id, o.value)}>{o.label}</button>
                        ))}
                    </div>
                </div>
            );
        }

        return {tweaks: values, setTweak, TweaksPanel, TweakSection, TweakToggle, TweakRadio};
    }

        const ref = useRef(null);

        useEffect(() => {
            if (!open) return;
            const handler = e => {
                if (ref.current && !ref.current.contains(e.target)) setOpen(false);
            };
            document.addEventListener('mousedown', handler);
            return () => document.removeEventListener('mousedown', handler);
        }, [open]);

        const actions = [];
        if (svc.status === 'running') actions.push({label: 'Restart', icon: '↺', danger: false});

    // ─── Deployments tab (Kanban + List) ─────────────────────────────
    function DeploymentsTab({activeNode}) {
        const [viewMode, setViewMode] = useState('kanban');

        const [envFilters, setEnvFilters] = useState(new Set());

        const cols = [
            {id: 'running', label: 'Running', color: T.green},
            {id: 'degraded', label: 'Degraded', color: T.amber},
            {id: 'stopped', label: 'Stopped', color: T.fgFaint},

        const toggleStatus = id => setStatusFilters(prev => {
            const next = new Set(prev);
            next.has(id) ? next.delete(id) : next.add(id);
            return next;
        });

        const toggleEnv = id => setEnvFilters(prev => {
            const next = new Set(prev);
            next.has(id) ? next.delete(id) : next.add(id);
            return next;

        const filtered = useMemo(() => {
            let svcs = activeNode === 'all' ? SERVICES : SERVICES.filter(s => s.node === activeNode);

                svcs = svcs.filter(s => s.name.toLowerCase().includes(q) || s.image.toLowerCase().includes(q));
            }
            if (statusFilters.size > 0) svcs = svcs.filter(s => statusFilters.has(s.column));

                                            fontFamily: T.mono, fontSize: 11, padding: '6px 14px', borderRadius: 7,

                                            background: active ? T.cyanDim : 'transparent',
                                            color: active ? T.cyan : T.fgDim,
                                            cursor: 'pointer', transition: 'all 0.12s',
                                        }}>{p}</button>
                            );
                        })}
                    </div>
                </Field>
            </div>
        );

        const StepConfig = () => (
            <div style={{display: 'flex', flexDirection: 'column', gap: 18}}>
                <Field label="Exposed ports" sub="comma-separated">
                    <input value={form.ports} onChange={e => set('ports', e.target.value)}
                           placeholder="8080, 9090" {...inp('ports')}/>
                </Field>
                <Field label="Restart policy">
                    <div style={{display: 'flex', gap: 6}}>
                        {['always', 'on-failure', 'never'].map(p => {
                            const active = form.restart === p;
                            return (
                                <button key={p} onClick={() => set('restart', p)}
                                        style={{
                                            fontFamily: T.mono, fontSize: 11, padding: '6px 14px', borderRadius: 7,
                                            border: `1px solid ${active ? T.borderH : T.border}`,
                                            background: active ? T.cyanDim : 'transparent',
                                            color: active ? T.cyan : T.fgDim,
                                            cursor: 'pointer', transition: 'all 0.12s',
                                        }}>{p}</button>
                            );
                        })}
                    </div>
                </Field>
                <Divider/>
                <Field label="Environment variables">
                    <div style={{display: 'flex', flexDirection: 'column', gap: 6}}>
                        {form.envVars.map((ev, i) => (
                            <div key={i} style={{
                                display: 'grid',
                                gridTemplateColumns: '1fr 1fr 28px',
                                gap: 6,
                                alignItems: 'center'
                            }}>
                                <input value={ev.key} onChange={e => setEnvVar(i, 'key', e.target.value)}
                                       placeholder="KEY" {...inp(`evk${i}`)}
                                       style={{...inputStyle(focusedField === `evk${i}`), fontWeight: 500}}/>
                                <input value={ev.value} onChange={e => setEnvVar(i, 'value', e.target.value)}
                                       placeholder="value" {...inp(`evv${i}`)}/>
                                <button onClick={() => removeEnvVar(i)}
                                        style={{
                                            width: 28,
                                            height: 34,
                                            display: 'flex',
                                            alignItems: 'center',
                                            justifyContent: 'center',
                                            background: 'transparent',
                                            border: `1px solid ${T.border}`,
                                            borderRadius: 7,
                                            color: T.fgFaint,
                                            cursor: 'pointer',
                                            fontSize: 14,
                                            transition: 'all 0.12s',
                                        }}
                                        onMouseEnter={e => {
                                            e.currentTarget.style.borderColor = T.red + '55';
                                            e.currentTarget.style.color = T.red;
                                        }}
                                        onMouseLeave={e => {
                                            e.currentTarget.style.borderColor = T.border;
                                            e.currentTarget.style.color = T.fgFaint;
                                        }}>
                                    ×
                                </button>
                            </div>
                        ))}
                        <button onClick={addEnvVar}
                                style={{
                                    fontFamily: T.mono, fontSize: 11, padding: '6px 12px', borderRadius: 7,
                                    border: `1px dashed ${T.border}`, background: 'transparent',
                                    color: T.fgDim, cursor: 'pointer', textAlign: 'left',
                                    transition: 'all 0.12s',
                                }}
                                onMouseEnter={e => {
                                    e.currentTarget.style.borderColor = T.borderM;
                                    e.currentTarget.style.color = T.fg;
                                }}
                                onMouseLeave={e => {
                                    e.currentTarget.style.borderColor = T.border;
                                    e.currentTarget.style.color = T.fgDim;
                                }}>
                            + add variable
                        </button>
                    </div>
                </Field>
            </div>
        );

        const StepResources = () => (
            <div style={{display: 'flex', flexDirection: 'column', gap: 18}}>
                <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12}}>
                    <Field label="CPU limit" sub="e.g. 500m, 2">
                        <input value={form.cpuLimit} onChange={e => set('cpuLimit', e.target.value)}
                               placeholder="500m" {...inp('cpu')}/>
                    </Field>
                    <Field label="Memory limit" sub="e.g. 512Mi, 2Gi">
                        <input value={form.memLimit} onChange={e => set('memLimit', e.target.value)}
                               placeholder="512Mi" {...inp('mem')}/>
                    </Field>
                </div>
                <Field label="Replicas">
                    <div style={{display: 'flex', alignItems: 'center', gap: 12}}>
                        <button onClick={() => set('replicas', Math.max(1, form.replicas - 1))}
                                style={{
                                    width: 34,
                                    height: 34,
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    background: T.bg4,
                                    border: `1px solid ${T.border}`,
                                    borderRadius: 7,
                                    color: T.fgMid,
                                    cursor: 'pointer',
                                    fontSize: 16,
                                    fontFamily: T.mono,
                                    transition: 'all 0.12s',
                                }}
                                onMouseEnter={e => {
                                    e.currentTarget.style.borderColor = T.borderM;
                                    e.currentTarget.style.color = T.fg;
                                }}
                                onMouseLeave={e => {
                                    e.currentTarget.style.borderColor = T.border;
                                    e.currentTarget.style.color = T.fgMid;
                                }}>
                            −
                        </button>
                        <span style={{
                            fontFamily: T.mono,
                            fontSize: 20,
                            fontWeight: 600,
                            color: T.fg,
                            minWidth: 32,
                            textAlign: 'center'
                        }}>
            {form.replicas}
          </span>
                        <button onClick={() => set('replicas', Math.min(8, form.replicas + 1))}
                                style={{
                                    width: 34,
                                    height: 34,
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    background: T.bg4,
                                    border: `1px solid ${T.border}`,
                                    borderRadius: 7,
                                    color: T.fgMid,
                                    cursor: 'pointer',
                                    fontSize: 16,
                                    fontFamily: T.mono,
                                    transition: 'all 0.12s',
                                }}
                                onMouseEnter={e => {
                                    e.currentTarget.style.borderColor = T.borderM;
                                    e.currentTarget.style.color = T.fg;
                                }}
                                onMouseLeave={e => {
                                    e.currentTarget.style.borderColor = T.border;
                                    e.currentTarget.style.color = T.fgMid;
                                }}>
                            +
                        </button>
                        <div style={{flex: 1, display: 'flex', gap: 3}}>
                            {Array.from({length: 8}).map((_, i) => (
                                <div key={i} style={{
                                    flex: 1, height: 6, borderRadius: 3,
                                    background: i < form.replicas ? T.cyan : T.bg4,
                                    transition: 'background 0.15s',
                                }}></div>
                            ))}
                        </div>
                    </div>
                </Field>
                <Divider/>
                {/* Resource preview */}
                <div
                    style={{background: T.bg4, border: `1px solid ${T.border}`, borderRadius: 9, padding: '14px 16px'}}>
                    <div style={{
                        fontFamily: T.mono,
                        fontSize: 10,
                        color: T.fgDim,
                        marginBottom: 10,
                        letterSpacing: '0.06em',
                        textTransform: 'uppercase'
                    }}>Allocation preview
                    </div>
                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16}}>
                        {[
                            {label: 'CPU total', value: `${form.replicas} × ${form.cpuLimit}`, color: T.cyan},
                            {label: 'Mem total', value: `${form.replicas} × ${form.memLimit}`, color: T.cyan},
                            {label: 'Replicas', value: form.replicas, color: T.fg},
                        ].map((s, i) => (
                            <div key={i}>
                                <div style={{
                                    fontFamily: T.mono,
                                    fontSize: 18,
                                    fontWeight: 600,
                                    color: s.color
                                }}>{s.value}</div>
                                <div style={{
                                    fontFamily: T.mono,
                                    fontSize: 10,
                                    color: T.fgDim,
                                    marginTop: 2
                                }}>{s.label}</div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const StepReview = () => (
            <div style={{display: 'flex', flexDirection: 'column', gap: 0}}>
                {!deploying && !deployed && (
                    <>
                        <div style={{
                            background: T.bg4,
                            border: `1px solid ${T.border}`,
                            borderRadius: 10,
                            overflow: 'hidden',
                            marginBottom: 16
                        }}>
                            {[
                                ['Service', form.name || '(unnamed)'],
                                ['Image', `${form.image || '(none)'}:${form.tag}`],
                                ['Node', form.node],
                                ['Environment', form.env],
                                ['Ports', form.ports || '—'],
                                ['CPU limit', form.cpuLimit],
                                ['Mem limit', form.memLimit],
                                ['Replicas', form.replicas],
                                ['Restart', form.restart],
                                ['Pull policy', form.pullPolicy],
                                ['Env vars', `${form.envVars.filter(e => e.key).length} configured`],
                            ].map(([k, v], i, arr) => (
                                <div key={k} style={{
                                    display: 'grid', gridTemplateColumns: '140px 1fr', gap: 12,
                                    padding: '10px 16px',
                                    borderBottom: i < arr.length - 1 ? `1px solid ${T.border}` : 'none',
                                }}>
                                    <span style={{fontFamily: T.mono, fontSize: 11, color: T.fgDim}}>{k}</span>
                                    <span style={{
                                        fontFamily: T.mono,
                                        fontSize: 11,
                                        color: T.fg,
                                        wordBreak: 'break-all'
                                    }}>{String(v)}</span>
                                </div>
                            ))}
                        </div>
                        {/* Warning if deploying to degraded node */}
                        {NODES.find(n => n.id === form.node)?.status === 'degraded' && (
                            <div style={{
                                display: 'flex', gap: 10, padding: '10px 14px',
                                background: T.amberDim, border: `1px solid ${T.amber}44`,
                                borderRadius: 8, marginBottom: 16,
                            }}>
                                <svg width="14" height="14" viewBox="0 0 10 10" fill="none"
                                     style={{flexShrink: 0, marginTop: 1}}>
                                    <path d="M5 1.2L9.2 8.8H0.8L5 1.2Z" stroke={T.amber} strokeWidth="1.2"
                                          strokeLinejoin="round" fill="rgba(245,166,35,0.18)"/>
                                    <line x1="5" y1="4.2" x2="5" y2="6.4" stroke={T.amber} strokeWidth="1.1"
                                          strokeLinecap="round"/>
                                    <circle cx="5" cy="7.5" r="0.55" fill={T.amber}/>
                                </svg>
                                <span style={{fontFamily: T.mono, fontSize: 11, color: T.amber, lineHeight: 1.5}}>
                {form.node} is currently <strong>degraded</strong>. Deploying here may be unstable.
              </span>
                            </div>
                        )}
                    </>
                )}

                {/* Deploy log */}
                {(deploying || deployed) && (
                    <div style={{
                        background: T.bg, border: `1px solid ${T.border}`, borderRadius: 10,
                        padding: '14px 16px', fontFamily: T.mono, fontSize: 11.5,
                        minHeight: 200, display: 'flex', flexDirection: 'column', gap: 5,
                    }}>
                        <div style={{
                            color: T.fgDim,
                            fontSize: 10,
                            marginBottom: 6,
                            letterSpacing: '0.06em',
                            textTransform: 'uppercase'
                        }}>deploy log
                        </div>
                        {logLines.map((line, i) => (
                            <div key={i} style={{
                                color: line.color,
                                animation: 'fadeUp 0.15s ease both',
                                display: 'flex',
                                gap: 10
                            }}>
                                <span style={{
                                    color: T.fgFaint,
                                    userSelect: 'none'
                                }}>{String(i + 1).padStart(2, '0')}</span>
                                <span>{line.text}</span>
                            </div>
                        ))}
                        {deploying && !deployed && (
                            <div style={{display: 'flex', alignItems: 'center', gap: 8, marginTop: 4}}>
                                <div style={{
                                    width: 10, height: 10, borderRadius: '50%',
                                    border: `2px solid ${T.cyan}`, borderTopColor: 'transparent',
                                    animation: 'spin 0.7s linear infinite', flexShrink: 0,
                                }}></div>
                                <span style={{color: T.fgDim, fontSize: 11}}>running…</span>
                            </div>
                        )}
                        {deployed && (
                            <div style={{
                                display: 'flex',
                                alignItems: 'center',
                                gap: 8,
                                marginTop: 8,
                                padding: '10px 14px',
                                background: T.greenDim,
                                border: `1px solid ${T.green}44`,
                                borderRadius: 8
                            }}>
                                <span style={{color: T.green, fontSize: 14}}>✓</span>
                                <span style={{fontFamily: T.mono, fontSize: 12, color: T.green, fontWeight: 600}}>
                {form.name || 'service'} deployed successfully
              </span>
                            </div>
                        )}
                    </div>
                )}
            </div>
        );

        const steps = [<StepImage/>, <StepConfig/>, <StepResources/>, <StepReview/>];
        const isLastStep = step === DEPLOY_STEPS.length - 1;
        const canDeploy = isLastStep && !deploying && !deployed;

        // Backdrop click closes (unless deploying)
        const handleBackdrop = (e) => {
            if (e.target === e.currentTarget && !deploying) onClose();
        };

        return (
            <div onClick={handleBackdrop}
                 style={{
                     position: 'fixed', inset: 0, zIndex: 500,
                     background: 'rgba(0,0,0,0.72)',
                     backdropFilter: 'blur(4px)',
                     display: 'flex', alignItems: 'center', justifyContent: 'center',
                     animation: 'fadeUp 0.18s ease both',
                 }}>
                <div style={{
                    width: 580, maxHeight: 'calc(100vh - 64px)',
                    background: T.bg2,
                    border: `1px solid ${T.borderM}`,
                    borderRadius: 14,
                    display: 'flex', flexDirection: 'column',
                    boxShadow: `0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(10,183,238,0.06)`,
                    overflow: 'hidden',
                }}>
                    {/* Header */}
                    <div style={{
                        display: 'flex', alignItems: 'center', gap: 12,
                        padding: '18px 22px 16px',
                        borderBottom: `1px solid ${T.border}`,
                        flexShrink: 0,
                    }}>
                        <div style={{
                            width: 32, height: 32, borderRadius: 8,
                            background: T.redDim, border: `1px solid ${T.red}44`,
                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                        }}>
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <path d="M8 2L13 5.5V10.5L8 14L3 10.5V5.5L8 2Z" stroke={T.red} strokeWidth="1.3"
                                      strokeLinejoin="round"/>
                                <circle cx="8" cy="8" r="2" fill={T.red} opacity="0.7"/>
                            </svg>
                        </div>
                        <div>
                            <div style={{fontFamily: T.sans, fontSize: 15, fontWeight: 700, color: T.fg}}>Deploy
                                service
                            </div>
                            <div style={{fontFamily: T.mono, fontSize: 10, color: T.fgDim, marginTop: 1}}>
                                {form.name ? `${form.name} → ${form.node}` : 'configure a new container deployment'}
                            </div>
                        </div>
                        <button onClick={!deploying ? onClose : undefined}
                                style={{
                                    marginLeft: 'auto', width: 28, height: 28,
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    background: 'transparent', border: `1px solid ${T.border}`,
                                    borderRadius: 7, color: T.fgDim, cursor: deploying ? 'not-allowed' : 'pointer',
                                    fontSize: 14, transition: 'all 0.12s', opacity: deploying ? 0.4 : 1,
                                }}
                                onMouseEnter={e => {
                                    if (!deploying) {
                                        e.currentTarget.style.borderColor = T.borderM;
                                        e.currentTarget.style.color = T.fg;
                                    }
                                }}
                                onMouseLeave={e => {
                                    e.currentTarget.style.borderColor = T.border;
                                    e.currentTarget.style.color = T.fgDim;
                                }}>
                            ✕
                        </button>
                    </div>

                    {/* Step indicator */}
                    <div style={{
                        display: 'flex', alignItems: 'center', gap: 0,
                        padding: '12px 22px', borderBottom: `1px solid ${T.border}`,
                        flexShrink: 0,
                    }}>
                        {DEPLOY_STEPS.map((s, i) => {
                            const done = i < step;
                            const active = i === step;
                            return (
                                <React.Fragment key={s}>
                                    <button
                                        onClick={() => {
                                            if (!deploying && !deployed && i < step) setStep(i);
                                        }}
                                        style={{
                                            display: 'flex',
                                            alignItems: 'center',
                                            gap: 7,
                                            background: 'transparent',
                                            border: 'none',
                                            cursor: (done && !deploying) ? 'pointer' : 'default',
                                            padding: '4px 0',
                                        }}>
                                        <div style={{
                                            width: 20, height: 20, borderRadius: '50%', flexShrink: 0,
                                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                                            background: done ? T.green : active ? T.red : T.bg4,
                                            border: `1px solid ${done ? T.green + '66' : active ? T.red + '66' : T.border}`,
                                            transition: 'all 0.2s',
                                        }}>
                                            {done ? (
                                                <span style={{color: '#fff', fontSize: 9, fontWeight: 700}}>✓</span>
                                            ) : (
                                                <span style={{
                                                    fontFamily: T.mono,
                                                    fontSize: 9,
                                                    color: active ? '#fff' : T.fgFaint,
                                                    fontWeight: 600
                                                }}>{i + 1}</span>
                                            )}
                                        </div>
                                        <span style={{
                                            fontFamily: T.mono, fontSize: 11, fontWeight: active ? 600 : 400,
                                            color: done ? T.green : active ? T.fg : T.fgDim,
                                            transition: 'color 0.2s',
                                        }}>{s}</span>
                                    </button>
                                    {i < DEPLOY_STEPS.length - 1 && (
                                        <div style={{
                                            flex: 1, height: 1, margin: '0 8px',
                                            background: i < step ? T.green + '55' : T.border,
                                            transition: 'background 0.3s',
                                        }}></div>
                                    )}
                                </React.Fragment>
                            );
                        })}
                    </div>

                    {/* Step content */}
                    <div style={{flex: 1, overflowY: 'auto', padding: '22px 22px 4px'}} key={step}>
                        {steps[step]}
                    </div>

                    {/* Footer */}
                    <div style={{
                        display: 'flex', alignItems: 'center', gap: 10,
                        padding: '16px 22px',
                        borderTop: `1px solid ${T.border}`,
                        flexShrink: 0,
                    }}>
                        {!deployed && (
                            <button onClick={step > 0 && !deploying ? () => setStep(s => s - 1) : undefined}
                                    style={{
                                        fontFamily: T.mono, fontSize: 12, padding: '8px 18px', borderRadius: 8,
                                        border: `1px solid ${T.border}`, background: 'transparent',
                                        color: step === 0 || deploying ? T.fgFaint : T.fgMid,
                                        cursor: step === 0 || deploying ? 'not-allowed' : 'pointer',
                                        transition: 'all 0.15s', opacity: step === 0 ? 0.4 : 1,
                                    }}
                                    onMouseEnter={e => {
                                        if (step > 0 && !deploying) {
                                            e.currentTarget.style.borderColor = T.borderM;
                                            e.currentTarget.style.color = T.fg;
                                        }
                                    }}
                                    onMouseLeave={e => {
                                        e.currentTarget.style.borderColor = T.border;
                                        e.currentTarget.style.color = T.fgMid;
                                    }}>
                                ← back
                            </button>
                        )}

                        <div style={{flex: 1}}></div>

                        {deployed ? (
                            <button onClick={onClose}
                                    style={{
                                        fontFamily: T.sans, fontSize: 13, fontWeight: 700, padding: '8px 24px',
                                        borderRadius: 8, border: 'none', cursor: 'pointer',
                                        background: T.green, color: '#fff', transition: 'opacity 0.15s',
                                    }}
                                    onMouseEnter={e => e.currentTarget.style.opacity = '0.85'}
                                    onMouseLeave={e => e.currentTarget.style.opacity = '1'}>
                                done
                            </button>
                        ) : isLastStep ? (
                            <button onClick={!deploying ? runDeploy : undefined}
                                    disabled={deploying}
                                    style={{
                                        fontFamily: T.sans, fontSize: 13, fontWeight: 700, padding: '8px 24px',
                                        borderRadius: 8, border: 'none', cursor: deploying ? 'not-allowed' : 'pointer',
                                        background: deploying ? T.bg4 : T.red,
                                        color: deploying ? T.fgDim : '#fff',
                                        display: 'flex', alignItems: 'center', gap: 8,
                                        transition: 'all 0.15s',
                                    }}
                                    onMouseEnter={e => {
                                        if (!deploying) e.currentTarget.style.opacity = '0.82';
                                    }}
                                    onMouseLeave={e => e.currentTarget.style.opacity = '1'}>
                                {deploying && (
                                    <div style={{
                                        width: 12,
                                        height: 12,
                                        borderRadius: '50%',
                                        border: `2px solid rgba(255,255,255,0.3)`,
                                        borderTopColor: '#fff',
                                        animation: 'spin 0.7s linear infinite'
                                    }}></div>
                                )}
                                {deploying ? 'deploying…' : '⬕ deploy'}
                            </button>
                        ) : (
                            <button onClick={() => setStep(s => s + 1)}
                                    style={{
                                        fontFamily: T.sans, fontSize: 13, fontWeight: 700, padding: '8px 24px',
                                        borderRadius: 8, border: 'none', cursor: 'pointer',
                                        background: T.red, color: '#fff', transition: 'opacity 0.15s',
                                    }}
                                    onMouseEnter={e => e.currentTarget.style.opacity = '0.82'}
                                    onMouseLeave={e => e.currentTarget.style.opacity = '1'}>
                                next →
                            </button>
                        )}
                    </div>
                </div>
            </div>
        );
    }

    // ─── Main App ─────────────────────────────────────────────────────
    function App() {
        const [collapsed, setCollapsed] = useState(false);
        const [activeNode, setActiveNode] = useState('node01');
        const [activeNav, setActiveNav] = useState('deployments');
        const [showAllNodes, setShowAllNodes] = useState(false);
        const [deployOpen, setDeployOpen] = useState(false);

        const {tweaks, setTweak, TweaksPanel, TweakSection, TweakToggle, TweakRadio} = useTweaks(/*EDITMODE-BEGIN*/{
            "compactCards": false,
            "accentColor": "red"
        }/*EDITMODE-END*/);

        const effectiveNode = showAllNodes ? 'all' : activeNode;

        return (
            <div style={{
                display: 'flex',
                flexDirection: 'column',
                height: '100vh',
                background: T.bg,
                fontFamily: T.sans,
                color: T.fg,
                overflow: 'hidden'
            }}>
                <div style={{display: 'flex', flex: 1, overflow: 'hidden'}}>
                    <Sidebar
                        collapsed={collapsed}
                        activeNode={activeNode}
                        setActiveNode={n => {
                            setActiveNode(n);
                            setShowAllNodes(false);
                        }}
                        activeNav={activeNav}
                        setActiveNav={setActiveNav}
                    />
                    <div style={{flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden'}}>
                        <TopBar
                            collapsed={collapsed}
                            setCollapsed={setCollapsed}
                            activeNav={activeNav}
                            setActiveNav={setActiveNav}
                            activeNode={activeNode}
                            showAllNodes={showAllNodes}
                            setShowAllNodes={setShowAllNodes}
                            onDeploy={() => setDeployOpen(true)}
                        />
                        {/* Tab content */}
                        <div style={{flex: 1, overflow: 'hidden', animation: 'fadeUp 0.25s ease both'}} key={activeNav}>
                            {activeNav === 'controlplane' && <ControlPlaneTab activeNode={effectiveNode}/>}
                            {activeNav === 'vcn' && <VCNTab activeNode={effectiveNode}/>}
                            {activeNav === 'deployments' && <DeploymentsTab activeNode={effectiveNode}/>}
                            {activeNav === 'search' && <SearchTab/>}
                        </div>
                    </div>
                </div>

                {deployOpen && <DeployDialog onClose={() => setDeployOpen(false)}/>}

                <TweaksPanel>
                    <TweakSection label="View"/>
                    <TweakToggle id="compactCards" label="Compact cards"/>
                    <TweakSection label="Theme"/>
                    <TweakRadio id="accentColor" label="Accent"
                                options={[{value: 'red', label: 'Red'}, {value: 'cyan', label: 'Cyan'}]}/>
                </TweaksPanel>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
