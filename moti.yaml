cache_path: proto_modules

deps:
  - github.com/googleapis/googleapis
  - go.redsock.ru/protoc-gen-npm@v0.0.17
  - github.com/vervstack/Matreshka@v1.0.95

generate:
  - inputs:
      - directory: "api/grpc"
    plugins:
      - name: go
        out: internal/api/server/velez_api
        opts:
          paths: source_relative
      - name: go-grpc
        out: internal/api/server/velez_api
        opts:
          paths: source_relative
      - name: grpc-gateway
        out: internal/api/server/velez_api
        opts:
          paths: source_relative

      - name: openapiv2
        out: pkg/docs/swaggers

      - name: docs
        out: pkg/docs
        opts:
          paths: source_relative

  - inputs:
      - git_repo:
          url: github.com/vervstack/Matreshka@v1.0.95
          sub_directory: api/grpc
    plugins:
      - name: go
        out: internal/api/clients
        opts:
          module: go.vervstack.ru
      - name: go-grpc
        out: internal/api/clients
        opts:
          module: go.vervstack.ru